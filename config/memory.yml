address_width: 32
data_width: 32

reset:
  pc: 0x30000000

regions:
  flash:
    base: 0x30000000
    size: 0x01000000
    kind: memory
    executable: true
    description: External SPI flash XIP window.

  psram:
    base: 0xc0000000
    size: 0x01800000
    kind: memory
    executable: true
    description: External PSRAM window, three 8MiB chips.

  clint:
    base: 0x02010000
    size: 0x00010000
    kind: peripheral
    description: Core-local interruptor.

  plic:
    base: 0x0c000000
    size: 0x00400000
    kind: peripheral
    description: Platform-level interrupt controller.

  uart0:
    base: 0x10000000
    size: 0x00001000
    kind: peripheral
    irq: 2
    description: UART16550 console.

  rcu:
    base: 0x10002000
    size: 0x00001000
    kind: peripheral
    description: Reset and clock control unit.

  rtc:
    base: 0x10004000
    size: 0x00001000
    kind: peripheral
    description: Real-time clock.

  wdg:
    base: 0x10005000
    size: 0x00001000
    kind: peripheral
    description: Watchdog timer.

  archinfo:
    base: 0x10006000
    size: 0x00001000
    kind: peripheral
    description: Architecture information registers.

  gpio0:
    base: 0x10100000
    size: 0x00001000
    kind: peripheral
    irq: 3
    description: GPIO controller.

  uart1:
    base: 0x10103000
    size: 0x00001000
    kind: peripheral
    description: APB4 UART controller.

  i2c:
    base: 0x10104000
    size: 0x00001000
    kind: peripheral
    description: APB4 I2C controller.

  pwm:
    base: 0x10106000
    size: 0x00001000
    kind: peripheral
    description: PWM controller.

  timer0:
    base: 0x10108000
    size: 0x00001000
    kind: peripheral
    irq: 1
    description: APB timer.

  timer1:
    base: 0x10109000
    size: 0x00001000
    kind: peripheral
    description: APB timer.

  timer2:
    base: 0x1010a000
    size: 0x00001000
    kind: peripheral
    description: APB timer.

  timer3:
    base: 0x1010b000
    size: 0x00001000
    kind: peripheral
    description: APB timer.

  qspi:
    base: 0x10200000
    size: 0x00001000
    kind: peripheral
    description: APB4 QSPI controller.

  rng:
    base: 0x10300000
    size: 0x00001000
    kind: peripheral
    description: Pseudo-random number generator.

  crc:
    base: 0x10301000
    size: 0x00001000
    kind: peripheral
    description: CRC calculation engine.

interrupts:
  timer0: 1
  uart0: 2
  gpio0: 3
  software: 4
  external: 5
